<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truly's Autojoiner</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>
body{background:#0a0e17;color:#e2e8f0}
.neon{text-shadow:0 0 10px #10b981}
</style>

</head>
<body>

<nav class="fixed top-0 w-full bg-black/80 border-b border-slate-800 backdrop-blur-lg">
<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
<h1 class="text-2xl font-bold neon">TRULY'S AUTOJOINER</h1>

<button onclick="discordLogin()" class="btn bg-emerald-600 text-white gap-2">
<i class="fab fa-discord"></i> Login
</button>
</div>
</nav>

<div id="login-screen" class="min-h-screen flex flex-col justify-center items-center text-center px-6">

<h2 class="text-6xl font-black neon mb-6">Truly's Autojoiner</h2>

<p class="text-xl text-slate-300 mb-12">
Private Roblox server joining<br>
4 € = 1 hour
</p>

<button onclick="discordLogin()" class="btn btn-lg bg-emerald-600 text-white gap-3">
<i class="fab fa-discord"></i>
Login with Discord
</button>

</div>

<div id="dashboard" class="hidden pt-24 pb-20 px-6 max-w-5xl mx-auto space-y-10">

<h2 class="text-4xl text-center font-bold">
Welcome back <span id="username" class="text-emerald-400"></span>
</h2>

<div class="card bg-slate-900 border border-slate-700">
<div class="card-body text-center">

<h3 class="text-xl font-bold">Server Slots</h3>

<div class="text-5xl font-black text-emerald-400">
<span id="slots-used">0</span> / 6
</div>

<div id="slot-message" class="text-slate-400"></div>

</div>
</div>

<div class="card bg-slate-900 border border-slate-700">
<div class="card-body text-center">

<h3 class="text-xl font-bold">Active Time</h3>

<div id="time-left" class="text-5xl font-black">
00:00:00
</div>

<div class="text-slate-400 mt-2">
Active Key: <span id="active-key">None</span>
</div>

</div>
</div>

<div class="card bg-slate-900 border border-slate-700">
<div class="card-body text-center">

<h3 class="text-xl font-bold">Queued Hours</h3>

<div id="queued-hours" class="text-4xl font-black text-amber-400">
0
</div>

<div id="queue-position" class="text-slate-400"></div>

</div>
</div>

<div id="admin-panel" class="hidden card bg-red-950/40 border border-red-700/50">
<div class="card-body">

<h3 class="text-2xl text-red-400 mb-4">Admin Panel</h3>

<textarea id="admin-keys" class="textarea textarea-bordered w-full h-32 font-mono bg-black text-white" placeholder="One key per line"></textarea>

<button onclick="uploadKeys()" class="btn btn-error w-full mt-3">
Upload Keys
</button>

<div class="flex gap-3 mt-6">

<input id="admin-self-count" type="number" value="5" class="input input-bordered w-32 bg-black text-white"/>

<button onclick="giveSelfKeys()" class="btn btn-success flex-1">
Give Myself Hours
</button>

</div>

</div>
</div>

</div>

<script>

const CLIENT_ID="1477548522713911448"
const REDIRECT_URI="https://trulysfinder.onrender.com/"
const ADMIN_ID="1049068212182073344"

let currentUserId=null
let expiryTimestamp=0


function discordLogin(){

const state=Math.random().toString(36)

localStorage.setItem("dc_state",state)

const params=new URLSearchParams({
client_id:CLIENT_ID,
redirect_uri:REDIRECT_URI,
response_type:"token",
scope:"identify",
state
})

window.location=`https://discord.com/oauth2/authorize?${params}`

}



function handleCallback(){

const hash=window.location.hash.substring(1)

if(!hash)return

const params=new URLSearchParams(hash)

const token=params.get("access_token")

if(!token)return

fetch("https://discord.com/api/users/@me",{
headers:{Authorization:`Bearer ${token}`}
})
.then(r=>r.json())
.then(user=>{

currentUserId=user.id

document.getElementById("username").textContent=user.username

document.getElementById("login-screen").style.display="none"
document.getElementById("dashboard").style.display="block"

if(user.id===ADMIN_ID){
document.getElementById("admin-panel").style.display="block"
}

updateStatus()

})

}



function formatTime(sec){

let h=Math.floor(sec/3600)
let m=Math.floor((sec%3600)/60)
let s=sec%60

return `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`

}



function startTimer(){

setInterval(()=>{

if(!expiryTimestamp)return

let remaining=Math.floor((expiryTimestamp-Date.now())/1000)

if(remaining<0)remaining=0

document.getElementById("time-left").textContent=formatTime(remaining)

},1000)

}



async function updateStatus(){

if(!currentUserId)return

const res=await fetch("/api/manage-keys",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"status",discordId:currentUserId})
})

const data=await res.json()

document.getElementById("slots-used").textContent=data.activeCount

document.getElementById("slot-message").textContent=
data.activeCount>=6?"All slots full":"Slots available"

document.getElementById("active-key").textContent=data.activeKey||"None"

document.getElementById("queued-hours").textContent=data.queuedHours

if(data.queuePosition){
document.getElementById("queue-position").textContent=
`Waiting for slot — position ${data.queuePosition} / ${data.queueLength}`
}else{
document.getElementById("queue-position").textContent=""
}

expiryTimestamp=data.expiry

}



async function uploadKeys(){

const text=document.getElementById("admin-keys").value.trim()

if(!text)return

const keys=text.split("\n").map(k=>k.trim()).filter(Boolean)

await fetch("/api/manage-keys",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"upload",
discordId:ADMIN_ID,
keys
})
})

alert("Keys uploaded")

}



async function giveSelfKeys(){

const amount=parseInt(document.getElementById("admin-self-count").value)

await fetch("/api/manage-keys",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"give-self",
discordId:ADMIN_ID,
amount
})
})

updateStatus()

}



window.onload=()=>{

handleCallback()

startTimer()

setInterval(updateStatus,10000)

}

</script>

</body>
</html>
